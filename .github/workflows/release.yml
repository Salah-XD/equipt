name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build:check
      - name: Verify CLI
        run: cd cli && npm ci && npm test
      - name: Verify site build
        run: cd site && npm ci && npm run build
      - name: Build release zips (per-plugin, per-skill, category bundles)
        run: |
          mkdir -p dist/skills dist/plugins
          for p in plugins/*/; do
            plugin=$(basename "$p")
            # 1) Upload-plugin zip — FLAT: .claude-plugin/plugin.json + skills/ + agents/ at the zip
            #    root. The shape claude.ai/desktop's "Customize → Plugins → Upload plugin" requires
            #    (whole plugin — installs every skill at once). Manifest at root, NOT wrapped.
            (cd "$p" && zip -rq "../../dist/plugins/${plugin}.zip" .)
            if [ -d "${p}skills" ]; then
              # 2) Category bundle (skills/<name>/...) — for unzipping into Claude Code's ~/.claude/.
              (cd "$p" && zip -rq "../../dist/${plugin}-skills.zip" skills)
              # 3) Per-skill zips — <name>/SKILL.md WRAPPED in a single folder. The shape
              #    claude.ai/desktop's "Customize → Skills → Upload skill" requires (one per upload).
              for s in "${p}skills"/*/; do
                name=$(basename "$s")
                (cd "${p}skills" && zip -rq "../../../dist/skills/${name}.zip" "$name")
              done
            fi
          done
          ls -la dist dist/skills dist/plugins
      - name: Publish GitHub Release (idempotent + throttled — avoids the secondary rate limit)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --generate-notes
          # Ensure it's published and marked latest (a partially-failed prior run can leave a draft).
          gh release edit "$tag" --draft=false --latest >/dev/null
          # Assets already on the release. Re-runs upload only what's MISSING, so even with 500+
          # per-skill zips we stay well under GitHub's primary and secondary rate limits, and a
          # partially-failed run can simply be re-triggered to finish.
          existing="$(gh release view "$tag" --json assets -q '.assets[].name' 2>/dev/null || true)"
          to_upload=()
          for f in dist/*.zip dist/plugins/*.zip dist/skills/*.zip; do
            [ -e "$f" ] || continue
            printf '%s\n' "$existing" | grep -qxF "$(basename "$f")" || to_upload+=("$f")
          done
          total=${#to_upload[@]}
          echo "Missing assets to upload: $total"
          # Upload in small paced batches. Pushing 500+ assets at once is what trips the secondary
          # rate limit, so cap each batch and pause between them.
          for ((i=0; i<total; i+=20)); do
            gh release upload "$tag" "${to_upload[@]:i:20}" --clobber
            echo "  uploaded $(( i+20 < total ? i+20 : total ))/$total"
            sleep 12
          done
          echo "Release $tag now has $(gh release view "$tag" --json assets -q '.assets | length') assets."
