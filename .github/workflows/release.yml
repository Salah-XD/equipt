name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build:check
      - name: Verify CLI
        run: cd cli && npm ci && npm test
      - name: Verify site build
        run: cd site && npm ci && npm run build
      - name: Build release zips (per-plugin, per-skill, category bundles)
        run: |
          mkdir -p dist/skills dist/plugins
          for p in plugins/*/; do
            plugin=$(basename "$p")
            # 1) Upload-plugin zip — FLAT: .claude-plugin/plugin.json + skills/ + agents/ at the zip
            #    root. The shape claude.ai/desktop's "Customize → Plugins → Upload plugin" requires
            #    (whole plugin — installs every skill at once). Manifest at root, NOT wrapped.
            (cd "$p" && zip -rq "../../dist/plugins/${plugin}.zip" .)
            if [ -d "${p}skills" ]; then
              # 2) Category bundle (skills/<name>/...) — for unzipping into Claude Code's ~/.claude/.
              (cd "$p" && zip -rq "../../dist/${plugin}-skills.zip" skills)
              # 3) Per-skill zips — <name>/SKILL.md WRAPPED in a single folder. The shape
              #    claude.ai/desktop's "Customize → Skills → Upload skill" requires (one per upload).
              for s in "${p}skills"/*/; do
                name=$(basename "$s")
                (cd "${p}skills" && zip -rq "../../../dist/skills/${name}.zip" "$name")
              done
            fi
          done
          ls -la dist dist/skills dist/plugins
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/skills/*.zip
            dist/plugins/*.zip
